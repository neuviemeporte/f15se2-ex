name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            configure: cmake -S . -B build
            build: cmake --build build -j$(nproc)
            test: ctest --test-dir build --output-on-failure

          - name: Windows MSVC x64
            os: windows-latest
            configure: cmake -S . -B build -G "Visual Studio 18 2026" -A x64
            build: cmake --build build --config Release --parallel
            test: ctest --test-dir build -C Release --output-on-failure

          - name: macOS Clang
            os: macos-latest
            configure: cmake -S . -B build
            build: cmake --build build -j$(sysctl -n hw.ncpu)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libx11-dev libxext-dev libxcursor-dev libxi-dev libxfixes-dev \
            libxrandr-dev libxss-dev libxtst-dev \
            libwayland-dev wayland-protocols \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev

      - name: Configure CMake
        run: ${{ matrix.configure }}

      - name: Build
        run: ${{ matrix.build }}

      - name: Test
        run: ${{ matrix.test }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake gcovr \
            libx11-dev libxext-dev libxcursor-dev libxi-dev libxfixes-dev \
            libxrandr-dev libxss-dev libxtst-dev \
            libwayland-dev wayland-protocols \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev

      - name: Configure CMake (coverage)
        run: cmake -S . -B build -DCOVERAGE=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests + generate coverage report
        run: cmake --build build --target coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: build/coverage.xml
          # Public repo: tokenless upload is fine. Never fail CI if the upload
          # is rate-limited or the service is down.
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
