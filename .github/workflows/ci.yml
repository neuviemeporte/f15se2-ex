name: CI

on:
  push:
    branches: [master, main, tests]
  pull_request:
    branches: [master, main, tests]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC
            os: ubuntu-latest
            configure: cmake -S . -B build
            build: cmake --build build -j$(nproc)
            test: ctest --test-dir build --output-on-failure

          - name: Windows MSVC x64
            os: windows-latest
            configure: cmake -S . -B build -G "Visual Studio 18 2026" -A x64
            build: cmake --build build --config Release --parallel
            test: ctest --test-dir build -C Release --output-on-failure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libx11-dev libxext-dev libwayland-dev wayland-protocols \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev

      - name: Configure CMake
        run: ${{ matrix.configure }}

      - name: Build
        run: ${{ matrix.build }}

      - name: Test
        run: ${{ matrix.test }}
